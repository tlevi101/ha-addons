---
version: 1.3.0
slug: assist_microphone
name: Assist Microphone
description: Use Assist with local microphone
url: https://github.com/home-assistant/addons/blob/master/assist_microphone
hassio_api: true
arch:
  - amd64
  - aarch64
init: false
discovery:
  - wyoming
map:
  - share:ro
options:
  awake_wav: "/usr/src/sounds/awake.wav"
  done_wav: "/usr/src/sounds/done.wav"
  timer_finished_wav: "/usr/src/sounds/timer_finished.wav"
  timer_repeat_count: 3
  timer_repeat_delay: 0.75
  sound_enabled: true
  noise_suppression: 0
  auto_gain: 0
  mic_volume_multiplier: 1.0
  sound_volume_multiplier: 1.0
  debug_logging: false
  vad_enabled: true
  vad_threshold: 0.5
  vad_trigger_level: 1
  vad_buffer_seconds: 2.0
  vad_wake_word_timeout: 5.0
  mic_samples_per_chunk: 512
  mic_seconds_to_mute_after_awake_wav: 0.5
  mic_channel_index: 0
  wake_refractory_seconds: 5.0
  satellite_area: ""
schema:
  awake_wav: str
  done_wav: str
  timer_finished_wav: str
  timer_repeat_count: int
  timer_repeat_delay: float
  sound_enabled: bool
  noise_suppression: int
  auto_gain: int
  mic_volume_multiplier: float
  sound_volume_multiplier: float
  debug_logging: bool
  vad_enabled: bool
  vad_threshold: float
  vad_trigger_level: int
  vad_buffer_seconds: float
  vad_wake_word_timeout: float
  mic_samples_per_chunk: int
  mic_seconds_to_mute_after_awake_wav: float
  mic_channel_index: int
  wake_refractory_seconds: float
  satellite_area: str?
audio: true
homeassistant: 2023.12.1
image: ghcr.io/tlevi101/assist-microphone:latest